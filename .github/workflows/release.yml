name: 发布镜像到 GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "版本提升类型 (patch / minor / major)"
        required: false
        default: patch

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt pytest

      - name: 运行单元测试
        run: pytest tests/ -v

  release:
    name: 提升版本 · 构建镜像 · 发布 GHCR
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 检出代码（完整历史）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 版本提升
      # ------------------------------------------------------------------
      - name: 读取并提升版本号
        id: version
        run: |
          CURRENT=$(cat VERSION | xargs)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          BUMP="${{ github.event.inputs.bump || 'patch' }}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            *)     PATCH=$((PATCH+1)) ;;
          esac
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "$NEW" > VERSION
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW"         >> "$GITHUB_OUTPUT"
          echo "版本：$CURRENT → $NEW"

      - name: 提交版本变更
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: 提升版本至 v${{ steps.version.outputs.new }}"
          git push origin HEAD

      - name: 创建 Git 标签
        run: |
          git tag "v${{ steps.version.outputs.new }}"
          git push origin "v${{ steps.version.outputs.new }}"

      # ------------------------------------------------------------------
      # 构建并推送 Docker 镜像到 GHCR
      # ------------------------------------------------------------------
      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 生成镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.new }}
          labels: |
            org.opencontainers.image.title=coding-agent-service
            org.opencontainers.image.description=AI 驱动的编码代理服务
            org.opencontainers.image.version=${{ steps.version.outputs.new }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ------------------------------------------------------------------
      # 创建 GitHub Release
      # ------------------------------------------------------------------
      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new }}
          name: "v${{ steps.version.outputs.new }}"
          body: |
            ## 变更内容

            - 从 `${{ steps.version.outputs.current }}` 提升至 `${{ steps.version.outputs.new }}`

            ## Docker 镜像

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.new }}
            docker pull ghcr.io/${{ github.repository }}:latest
            ```
          generate_release_notes: true
