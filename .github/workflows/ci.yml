name: CI — 镜像构建与测试验证

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt pytest

      - name: 运行单元测试
        run: pytest tests/ -v

  build:
    name: Docker 镜像构建
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: coding-agent-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 验证镜像启动
        run: |
          docker build -t coding-agent-service:ci .
          docker run --rm -d \
            -p 8000:8000 \
            -e ANTHROPIC_API_KEY=test-key \
            --name coding-agent-ci \
            coding-agent-service:ci
          sleep 3
          curl --retry 5 --retry-delay 2 --retry-connrefused \
            http://localhost:8000/docs -o /dev/null -w "%{http_code}" | grep -q 200
          docker stop coding-agent-ci
