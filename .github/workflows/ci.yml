name: CI — 镜像构建与测试验证

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt pytest

      - name: 运行单元测试
        run: pytest tests/ -v

  build:
    name: Docker 镜像构建与验证
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: coding-agent-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 验证镜像启动与 API 健康检查
        run: |
          docker build -t coding-agent-service:ci .
          docker run --rm -d \
            -p 8000:8000 \
            -e ANTHROPIC_API_KEY=test-key \
            --name coding-agent-ci \
            coding-agent-service:ci
          sleep 5
          # 验证 /docs 端点可访问（HTTP 200）
          curl --retry 5 --retry-delay 2 --retry-connrefused \
            http://localhost:8000/docs -o /dev/null -w "%{http_code}" | grep -q 200
          # 验证 /openapi.json 可访问并包含 /task 路径
          curl -sf http://localhost:8000/openapi.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if '/task' not in data['paths']:
              sys.exit('/task 路径未在 OpenAPI 文档中找到')
          print('OpenAPI 文档验证通过')
          "
          # 验证未授权访问返回 422（缺少必填参数）
          status=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:8000/task \
            -H "Content-Type: application/json" -d '{}')
          [ "$status" = "422" ] && echo "参数校验正常（422）" || (echo "期望 422，实际 $status" && exit 1)
          # 验证 GET /task 未携带 token 返回 422
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/task)
          [ "$status" = "422" ] && echo "Token 校验正常（422）" || (echo "期望 422，实际 $status" && exit 1)
          # 验证 GET /task 携带无效 token 返回 401
          status=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8000/task?token=invalid")
          [ "$status" = "401" ] && echo "无效 token 校验正常（401）" || (echo "期望 401，实际 $status" && exit 1)
          docker stop coding-agent-ci

