<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coding Agent Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1e1e1e; color: #d4d4d4; font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
    #status-bar {
      background: #252526;
      border-bottom: 1px solid #3c3c3c;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    #status-bar h1 { font-size: 14px; font-weight: 600; color: #cccccc; }
    #status-badge {
      font-size: 12px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #status-badge.running  { background: #0e7a3c; color: #fff; }
    #status-badge.done     { background: #1d6fa5; color: #fff; }
    #status-badge.failed   { background: #9b2020; color: #fff; }
    #status-badge.idle     { background: #555; color: #ccc; }
    #terminal-container { flex: 1; overflow: hidden; padding: 4px; }
  </style>
</head>
<body>
  <div id="status-bar">
    <h1>Coding Agent</h1>
    <span id="status-badge" class="running">RUNNING</span>
  </div>
  <div id="terminal-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script>
    const TOKEN = "__TOKEN__";
    const term = new Terminal({ cursorBlink: true, scrollback: 10000, theme: { background: "#1e1e1e" } });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById("terminal-container"));
    fitAddon.fit();
    window.addEventListener("resize", () => fitAddon.fit());

    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    const ws = new WebSocket(`${proto}//${location.host}/ws?token=${TOKEN}`);
    ws.binaryType = "arraybuffer";

    ws.onopen = () => term.writeln("\r\n\x1b[32m[connected]\x1b[0m\r\n");
    ws.onmessage = (e) => term.write(new Uint8Array(e.data));
    ws.onclose = () => term.writeln("\r\n\x1b[33m[disconnected]\x1b[0m");
    ws.onerror = () => term.writeln("\r\n\x1b[31m[websocket error]\x1b[0m");

    term.onData((data) => {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(new TextEncoder().encode(data));
      }
    });

    // Poll status
    async function pollStatus() {
      try {
        const res = await fetch(`/task?token=${TOKEN}`);
        if (!res.ok) return;
        const { status } = await res.json();
        const badge = document.getElementById("status-badge");
        badge.textContent = status;
        badge.className = "";
        badge.classList.add(status.toLowerCase());
      } catch (_) {}
    }

    setInterval(pollStatus, 3000);
    pollStatus();
  </script>
</body>
</html>
